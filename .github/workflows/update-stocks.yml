name: 시세·청약 갱신 & 배포

on:
  schedule:
    # 30분마다 실행 — 주식 시세를 갱신합니다 (GitHub 사정에 따라 다소 지연될 수 있음).
    # 정각·30분은 전 세계 cron 이 몰려 실행이 지연되거나 통째로 드롭됩니다.
    # 붐비지 않는 분(7·37)으로 비켜서 드롭 확률을 낮춥니다. 그래도 보장은 없습니다.
    # 청약 일정은 아래 단계에서 한국 기준 하루 2회(오전 10시·오후 3시)만 새로 받습니다.
    - cron: "7,37 * * * *"
  workflow_dispatch:        # Actions 탭에서 수동 실행
  push:
    branches: [main]        # 코드 수정 시 즉시 반영

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 실행 방지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 주식 시세: 실행할 때마다 갱신 ──────────────────────────────
      - name: 시세 데이터 받기
        run: node scripts/fetch-stocks.mjs

      # ── 구글 시트 거래내역(테스트 탭) ─────────────────────────────
      # 공개 시트 CSV export 라 별도 인증 불필요. 실패해도 빌드는 진행.
      - name: 구글 시트 받기
        run: node scripts/fetch-sheets.mjs
        continue-on-error: true

      # ── 청약 일정: 한국 기준 하루 2회(오전 10시·오후 3시)만 갱신 ────
      # 주식과 달리 청약 공고는 자주 안 바뀌므로 매 실행마다 받지 않습니다.
      # cheongyak.json 을 캐시에 보관해 두고, 갱신이 필요할 때만 새로 받습니다.
      #  · schedule(30분): 마지막 수집이 직전 슬롯(10시/15시 KST) 전이면 그 슬롯 첫 실행에서 수집
      #  · push / 수동 실행: 항상 새로 수집 (인증키 등록 직후 바로 반영되도록)
      - name: 청약 일정 캐시 복원
        uses: actions/cache/restore@v4
        with:
          path: cheongyak.json
          # run_id 키는 매 실행 고유 → 항상 빗나가고, restore-keys 로 '가장 최근' 캐시를 가져옵니다.
          key: cheongyak-${{ github.run_id }}
          restore-keys: |
            cheongyak-

      - name: 청약 갱신 필요 여부 판단
        id: cy
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "fetch=true" >> "$GITHUB_OUTPUT"
            echo "${{ github.event_name }} 이벤트 → 청약 일정 새로 받기"
            exit 0
          fi
          fetch=$(node -e '
            const now = Date.now();
            const k = new Date(now + 9 * 3600000);   // KST 벽시계
            // KST hh시(오늘)를 실제 epoch(ms) 로 환산
            const slot = (hh) =>
              Date.UTC(k.getUTCFullYear(), k.getUTCMonth(), k.getUTCDate(), hh) - 9 * 3600000;
            const s10 = slot(10), s15 = slot(15);
            // 지금이 속한 수집 슬롯의 시작 (오늘 15시 / 오늘 10시 / 어제 15시)
            const slotStart = now >= s15 ? s15 : now >= s10 ? s10 : s15 - 864e5;
            let last = NaN;
            try { last = Date.parse(require("./cheongyak.json").updatedAt || ""); } catch {}
            // 이번 슬롯 안에서 아직 안 받았으면 수집
            process.stdout.write(!last || isNaN(last) || last < slotStart ? "true" : "false");
          ')
          echo "fetch=$fetch" >> "$GITHUB_OUTPUT"
          echo "schedule 이벤트 → 이번 슬롯 청약 갱신 필요 = $fetch"

      - name: 청약 일정 받기
        if: steps.cy.outputs.fetch == 'true'
        run: node scripts/fetch-cheongyak.mjs
        env:
          # data.go.kr 인증키 — 저장소 Secret 으로 등록 (README 참고).
          # 미설정이어도 스크립트는 빈 결과를 쓰고 정상 종료합니다.
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}

      - name: 청약 일정 캐시 저장
        if: steps.cy.outputs.fetch == 'true'
        uses: actions/cache/save@v4
        with:
          path: cheongyak.json
          key: cheongyak-${{ github.run_id }}

      - name: 사이트 파일 모으기
        run: |
          mkdir -p _site
          cp index.html style.css app.js portfolio.json data.json cheongyak.json _site/
          # sheets.json 은 fetch 실패 시 없을 수 있어 있을 때만 복사
          [ -f sheets.json ] && cp sheets.json _site/ || true

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        # path 기본값은 _site

      - name: 배포
        id: deploy
        uses: actions/deploy-pages@v4
